<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Expense Tracker</h2>
    <div class="balance">Balance: ₹<span id="balance">10200</span></div>

    <div class="summary">
      <div class="box expense">Expense: ₹<span id="expense">300</span></div>
      <div class="box income">Income: ₹<span id="income">10500</span></div>
    </div>

    <button class="add-btn" onclick="showAddForm()">Add</button>

    <div class="transactions">
      <h3>Transactions</h3>
      <input type="text" class="search-bar" placeholder="Search..." onkeyup="searchTransaction(this.value)">
      <div id="transaction-list">
        <div class="transaction">
          <span>Salary</span>
          <span class="amount positive">₹10000</span>
        </div>
        <div class="transaction">
          <span>Milk</span>
          <span class="amount negative">₹200</span>
        </div>
        <div class="transaction">
          <span>Cashback</span>
          <span class="amount positive">₹500</span>
        </div>
        <div class="transaction">
          <span>Food</span>
          <span class="amount negative">₹100</span>
        </div>
      </div>
    </div>
  </div>

  <div id="add-form">
    <input type="text" id="desc" placeholder="Description">
    <input type="number" id="amount" placeholder="Amount">
    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <button onclick="addTransaction()">Save</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
